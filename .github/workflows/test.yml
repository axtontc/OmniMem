name: OmniMem CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7687:7687
          - 7474:7474
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: omnimem
          POSTGRES_PASSWORD: omnimem_pass
          POSTGRES_DB: omnimem_db
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio
    - name: Run Tests
      env:
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        POSTGRES_USER: omnimem
        POSTGRES_PASSWORD: omnimem_pass
        POSTGRES_DB: omnimem_db
      run: |
        pytest tests/
